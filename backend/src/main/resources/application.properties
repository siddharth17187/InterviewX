spring.application.name=InterviewX

server.port=${PORT:8080}

# =====================================================================
# Database Configuration
# =====================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =====================================================================
# Security & Auth (JWT & Google OAuth)
# =====================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

google.client-id=${GOOGLE_CLIENT_ID}

# =====================================================================
# File Storage Settings
# =====================================================================
file.upload-dir=uploads
resume.upload-dir=uploads/resume

# =====================================================================
# Mail Service (Gmail SMTP)
# =====================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================================================
# External APIs (Gemini & RapidAPI)
# =====================================================================
gemini.api.key=${GEMINI_API_KEY}

rapidapi.key=${RAPIDAPI_KEY}
rapidapi.host=jsearch.p.rapidapi.com
rapidapi.url=https://jsearch.p.rapidapi.com/search-v2

# =====================================================================
# Redis Caching (Configured with default fallbacks to prevent startup crashes)
# =====================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=none
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# =====================================================================
# Logging & Debugging
# =====================================================================
logging.level.org.springframework.security=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always